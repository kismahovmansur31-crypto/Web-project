<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Полароид Альбом</title>
    <style>
    body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f0f0f0;
        margin: 0;
        padding: 40px;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 350px);
        gap: 80px;
    }
    .slot {
        width: 350px;
        height: 420px;
        background: white;
        border: 1px solid #ddd;
        box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        padding: 20px 20px 60px 20px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.3s ease;
    }
    .slot:hover {
        transform: scale(1.03) translateY(-10px);
    }
    .slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .placeholder {
        width: 100%;
        height: 100%;
        border: 3px dashed #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        color: #eee;
    }
</style>

</head>
<body>
    <h1>Мои воспоминания</h1>
    <div class="grid">
        {% for i in range(1, 7) %}
        <div class="slot" onclick="document.getElementById('file-{{i}}').click()">
            {% if i in photos %}
                <!-- Добавляем случайное число к ссылке, чтобы браузер обновлял картинку сразу -->
                <img src="{{ url_for('static', filename='uploads/' + photos[i]) }}?{{ range(1, 9999)|random }}">
            {% else %}
                <div class="placeholder">+</div>
            {% endif %}
            
            <form action="/upload" method="post" enctype="multipart/form-data" id="form-{{i}}" style="display:none;">
                <input type="file" name="photo" id="file-{{i}}" onchange="document.getElementById('form-{{i}}').submit()">
                <input type="hidden" name="slot_id" value="{{i}}">
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
